# autobuilder_config_v1.yaml
# Runtime configuration for auto-builder.py (format v1).
#
# Usage:
#   autobuilderclaude.py --input plan.md --config this_file.yaml
#
# Copy this file, fill in all required fields, and pass it via --config.
# Values here override any matching key in the plan's ## Build Config block.
# Remove comments from production copies if desired.
#
# INSTRUCTIONS FOR THE CLAUDE INSTANCE WRITING A CONFIG:
#   Replace every <PLACEHOLDER> with a real absolute path or value.
#   All paths must be absolute. Relative paths are not supported.
#   Remove this comment block from the production file.

# ---------------------------------------------------------------------------
# Required
# ---------------------------------------------------------------------------

# Absolute path to the project repository root.
# claude receives "Working directory: {repo}" as the first line of every prompt.
repo: <absolute path to repo root>

# Directory for build logs. Created automatically if it does not exist.
# Recommended: one level above the repo (sibling directory).
# Example: if repo is /home/user/project, use /home/user/tmp_build_logs
log_dir: <absolute path to log directory>

# ---------------------------------------------------------------------------
# Optional
# ---------------------------------------------------------------------------

# Path to a plain-text file containing the license header to prepend to
# new source files. The builder instructs claude to use this header verbatim.
# Set to null or omit to skip license header injection.
license_file: <absolute path to LICENSE_HEADER.txt or null>

# Default model when a task's Model: field is absent or unrecognized.
# Must be one of the keys in the models dict below, or a full model ID.
default_model: sonnet

# ---------------------------------------------------------------------------
# Model ID aliases
# Update these values when new model versions are released.
# Use the keys "haiku", "sonnet", "opus" in plan Model: fields.
# ---------------------------------------------------------------------------
models:
  haiku:  claude-haiku-4-5-20251001
  sonnet: claude-sonnet-4-6
  opus:   claude-opus-4-6
